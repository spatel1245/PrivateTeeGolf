<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Tee Golf - Public Trial Ad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0f1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .ad-card {
            width: min(96vmin, 1080px);
            height: min(96vmin, 1080px);
            border-radius: 0;
            overflow: hidden;
            position: relative;
            background: #064e3b;
            border: 2px solid rgba(217, 119, 6, 0.5);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
        }

        .bg-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 44%;
            filter: brightness(0.9) saturate(1.06);
            transform: scale(1.04);
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.08) 0%, rgba(0, 0, 0, 0.16) 100%);
        }

        .content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px;
            color: #ffffff;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.36);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 14px;
            padding: 14px 18px;
            backdrop-filter: blur(1.5px);
        }

        .brand {
            font-family: "Playfair Display", serif;
            font-size: 52px;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .brand-accent { color: #10b981; }

        .location-pill {
            font-size: 19px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #e5e7eb;
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 10px 16px;
            border-radius: 999px;
        }

        .hero-copy {
            margin-top: auto;
            margin-bottom: 26px;
            font-family: "Playfair Display", serif;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.28) 0%, rgba(15, 23, 42, 0.46) 100%);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 16px;
            padding: 20px 24px 22px;
            backdrop-filter: blur(1px);
        }

        .eyebrow {
            display: inline-block;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: #f59e0b;
            font-weight: 700;
            margin-bottom: 14px;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .headline {
            font-family: "Playfair Display", serif;
            font-size: 84px;
            line-height: 0.95;
            letter-spacing: -0.03em;
            margin-bottom: 16px;
            text-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
        }

        .headline-rate {
            color: #fbbf24;
            font-style: italic;
            text-shadow: 0 6px 20px rgba(0, 0, 0, 0.45);
        }

        .subtext {
            font-size: 38px;
            line-height: 1.12;
            color: #f1f5f9;
            max-width: 850px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.52);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 14px;
            padding: 16px 18px;
        }

        .value-stack {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .value-label {
            font-size: 17px;
            color: #86efac;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            font-weight: 700;
        }

        .value-line {
            font-size: 30px;
            color: #ffffff;
            font-weight: 700;
            font-family: "Playfair Display", serif;
        }

        /* intentionally no CTA pill (screenshot ad) */
    </style>
</head>
<body>
<div class="ad-card">
    <img class="bg-image" src="../images/facility/2.jpeg" alt="Private Tee Golf facility interior">
    <div class="overlay"></div>
    <div class="content">
        <div class="top-row">
            <div class="brand">Private Tee <span class="brand-accent">Golf.</span></div>
            <div class="location-pill">Greensburg, PA</div>
        </div>

        <div class="hero-copy">
            <div class="eyebrow">Public Trial Sessions</div>
            <h1 class="headline">Play for <span class="headline-rate">$35/hr</span></h1>
        </div>

        <div class="bottom-row">
            <div class="value-stack">
                <div class="value-label">Greensburg, PA</div>
                <div class="value-line">PrivateTeeGolf.com</div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
