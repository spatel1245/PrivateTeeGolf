<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Tee Golf - Facebook Ad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0f1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .ad-card {
            width: 1080px;
            height: 1080px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 36px 40px;
            background: #0f172a;
            flex-shrink: 0;
        }
        .top-brand {
            font-family: "Playfair Display", serif;
            font-size: 44px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
        }
        .top-brand-accent { color: #10b981; }
        .top-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .top-location-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #10b981;
        }
        .top-location-text {
            font-size: 22px;
            color: rgba(255,255,255,0.9);
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .accent-line {
            height: 4px;
            background: linear-gradient(90deg, #10b981, #34d399, #10b981);
            flex-shrink: 0;
        }

        /* Image */
        .image-area {
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }
        .image-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 44%;
            display: block;
        }

        /* Bottom Bar */
        .bottom-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 32px 40px;
            background: #0f172a;
            flex-shrink: 0;
        }
        .bottom-left-label {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #10b981;
            margin-bottom: 4px;
        }
        .bottom-left-text {
            font-family: "Playfair Display", serif;
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
            font-style: italic;
        }
        .bottom-right-label {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 2px;
            text-align: right;
        }
        .bottom-right-url {
            font-family: "Playfair Display", serif;
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="ad-card">

    <!-- Top Bar -->
    <div class="top-bar">
        <span class="top-brand">Private Tee <span class="top-brand-accent">Golf.</span></span>
        <div class="top-right">
            <div class="top-location-dot"></div>
            <span class="top-location-text">Greensburg, PA</span>
        </div>
    </div>
    <div class="accent-line"></div>

    <!-- Image -->
    <div class="image-area">
        <img src="../images/facility/2.jpeg" alt="Private Tee Golf Interior">
    </div>

    <!-- Bottom -->
    <div class="accent-line"></div>
    <div class="bottom-bar">
        <div>
            <div class="bottom-left-label">Opening March 27</div>
            <div class="bottom-left-text">Memberships Available</div>
        </div>
        <div>
            <div class="bottom-right-label">Get Started</div>
            <div class="bottom-right-url">PrivateTeeGolf.com</div>
        </div>
    </div>

</div>

</body>
</html>
